<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签批量编辑工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                        accent: '#F59E0B',
                        danger: '#EF4444',
                        dark: '#1E293B',
                        light: '#F8FAFC'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        /* 自定义滚动条 */
        #file-list::-webkit-scrollbar,
        #tags-container::-webkit-scrollbar { width: 4px; }
        #file-list::-webkit-scrollbar-track,
        #tags-container::-webkit-scrollbar-track { background: transparent; }
        #file-list::-webkit-scrollbar-thumb,
        #tags-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        #file-list::-webkit-scrollbar-thumb:hover,
        #tags-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-200">
        <div class="container mx-auto px-4 py-2">
            <div class="flex justify-between items-center">
                <div class="flex items-center">
                    <i class="fa fa-wrench text-primary text-2xl mr-2"></i>
                    <h1 class="text-xl font-bold text-dark">标签批量编辑工具</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button id="btn-toggle-preview" class="flex items-center justify-center bg-gray-500 hover:bg-gray-600 text-white font-medium py-1.5 px-3 rounded-lg cursor-pointer transition-all text-xs" onclick="togglePreview()">
                        <i class="fa fa-eye mr-1"></i> 预览
                    </button>
                    <button id="btn-toggle-editor" class="flex items-center justify-center bg-gray-500 hover:bg-gray-600 text-white font-medium py-1.5 px-3 rounded-lg cursor-pointer transition-all text-xs" onclick="toggleEditor()">
                        <i class="fa fa-columns mr-1"></i> 编辑
                    </button>
                    <a id="link-to-editor" href="/editor" class="flex items-center justify-center bg-gray-800 hover:bg-gray-900 text-white font-medium py-1.5 px-3 rounded-lg transition-all text-xs" onclick="return navigateToEditor()">
                        <i class="fa fa-crop mr-1"></i> 图片编辑
                    </a>
                </div>
            </div>
            <div class="flex flex-wrap gap-1.5 mt-2">
                <label for="file-upload" class="flex items-center justify-center bg-primary hover:bg-primary/90 text-white font-medium py-1.5 px-3 rounded-lg cursor-pointer transition-all text-xs">
                    <i class="fa fa-upload mr-1"></i> 上传文件夹
                </label>
                <label for="image-upload" class="flex items-center justify-center bg-secondary hover:bg-secondary/90 text-white font-medium py-1.5 px-3 rounded-lg cursor-pointer transition-all text-xs">
                    <i class="fa fa-image mr-1"></i> 上传图片
                </label>
                <form id="upload-form" action="/upload" method="post" class="hidden" enctype="multipart/form-data">
                    <input id="file-upload" type="file" name="files" multiple webkitdirectory
                           class="hidden" onchange="handleFolderSelect(this)">
                </form>
                <form id="image-upload-form" action="/upload" method="post" class="hidden" enctype="multipart/form-data">
                    <input id="image-upload" type="file" name="files" multiple accept="image/png,image/jpeg,image/gif"
                           class="hidden" onchange="this.form.submit()">
                </form>
                <button id="btn-auto-tag" class="flex items-center justify-center bg-accent hover:bg-accent/90 text-white font-medium py-1.5 px-3 rounded-lg cursor-pointer transition-all text-xs" onclick="openAutoTagModal()">
                    <i class="fa fa-magic mr-1"></i> 自动打标
                </button>
                <button class="flex items-center justify-center bg-secondary hover:bg-secondary/90 text-white font-medium py-1.5 px-3 rounded-lg cursor-pointer transition-all text-xs" onclick="prependTags()">
                    <i class="fa fa-tag mr-1"></i> 添加触发词
                </button>
                <button id="btn-batch-translate" class="flex items-center justify-center bg-primary hover:bg-primary/90 text-white font-medium py-1.5 px-3 rounded-lg cursor-pointer transition-all text-xs" onclick="batchTranslate()">
                    <i class="fa fa-language mr-1"></i> 批量翻译
                </button>
                <button class="flex items-center justify-center bg-gray-600 hover:bg-gray-700 text-white font-medium py-1.5 px-3 rounded-lg cursor-pointer transition-all text-xs" onclick="openTagStats()">
                    <i class="fa fa-bar-chart mr-1"></i> 标签统计
                </button>
                <button id="clear-all" class="flex items-center justify-center bg-danger hover:bg-danger/90 text-white font-medium py-1.5 px-3 rounded-lg cursor-pointer transition-all text-xs">
                    <i class="fa fa-trash mr-1"></i> 清空所有
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="flex-grow container mx-auto px-4 py-4">
        {% if images %}
        <!-- 图片列表侧栏 + 编辑区 -->
        <div class="flex gap-3 h-[calc(100vh-120px)]">
            <!-- 左侧：文件名列表 -->
            <div class="w-48 flex-shrink-0 bg-white rounded-lg shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                <div class="px-3 py-2 bg-gray-50 border-b border-gray-200 font-semibold text-xs text-gray-500 uppercase tracking-wide flex items-center justify-between">
                    <span>图片列表</span>
                    <span class="text-xs text-gray-400 font-normal" id="image-counter">{{ image_count }} 张</span>
                </div>
                <div id="file-list" class="flex-grow overflow-y-auto">
                </div>
            </div>

            <!-- 中间：图片预览 -->
            <div id="preview-panel" class="w-64 flex-shrink-0 bg-white rounded-lg shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                <div id="preview-area" class="relative flex-1 min-h-0 flex justify-center items-center bg-gray-100 p-2 overflow-hidden">
                    <img id="preview-img" src="" alt="" class="rounded select-none">
                </div>
                <div class="flex border-t border-gray-200">
                    <button id="btn-prev" class="flex-1 py-2 text-center hover:bg-primary/5 transition-colors text-gray-500 hover:text-primary" onclick="navigatePrev()" title="上一张 (←)">
                        <i class="fa fa-chevron-left"></i>
                    </button>
                    <div class="w-px bg-gray-200 self-stretch"></div>
                    <button id="btn-next" class="flex-1 py-2 text-center hover:bg-primary/5 transition-colors text-gray-500 hover:text-primary" onclick="navigateNext()" title="下一张 (→)">
                        <i class="fa fa-chevron-right"></i>
                    </button>
                </div>
            </div>

            <!-- 右侧：标签列表 + 操作按钮 -->
            <div id="editor-panel" class="flex-grow bg-white rounded-lg shadow-sm border border-gray-200 flex flex-col min-w-0 overflow-hidden">
                <!-- 表头 -->
                <div class="flex bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-500 uppercase tracking-wide">
                    <div class="w-7"></div>
                    <div class="flex-1 px-3 py-2 border-r border-gray-200">标签</div>
                    <div class="w-7"></div>
                    <div class="flex-1 px-3 py-2">翻译</div>
                    <div class="w-7"></div>
                </div>
                <!-- 标签列表 -->
                <div id="tags-container" class="flex-grow overflow-y-auto">
                    <!-- 动态生成 -->
                </div>
                <!-- 底部按钮栏 -->
                <div class="flex gap-2 px-3 py-2.5 border-t border-gray-200 bg-gray-50">
                    <button class="bg-white hover:bg-gray-100 text-gray-600 font-medium py-1.5 px-3 rounded-md transition-all flex items-center justify-center text-sm border border-gray-200" onclick="addTag()">
                        <i class="fa fa-plus mr-1"></i> 添加行
                    </button>
                    <button id="btn-translate-en" class="flex-1 bg-accent hover:bg-accent/90 text-white font-medium py-1.5 px-3 rounded-md transition-all flex items-center justify-center text-sm" onclick="translateAllTags('en2zh')">
                        <i class="fa fa-arrow-right mr-1"></i> 英译中
                    </button>
                    <button id="btn-translate-zh" class="flex-1 bg-secondary hover:bg-secondary/90 text-white font-medium py-1.5 px-3 rounded-md transition-all flex items-center justify-center text-sm" onclick="translateAllTags('zh2en')">
                        <i class="fa fa-arrow-left mr-1"></i> 中译英
                    </button>
                    <button id="btn-save" class="flex-1 bg-primary hover:bg-primary/90 text-white font-medium py-1.5 px-3 rounded-md transition-all flex items-center justify-center text-sm" onclick="saveCaption()">
                        <i class="fa fa-save mr-1"></i> 保存当前标签
                    </button>
                </div>
            </div>
        </div>
        {% else %}
        <!-- 没有图片时显示 -->
        <div class="flex flex-col items-center justify-center bg-white rounded-xl border border-dashed border-gray-300 p-16 text-center mt-16">
            <i class="fa fa-picture-o text-gray-200 text-7xl mb-6"></i>
            <h3 class="text-lg font-medium text-gray-400 mb-2">暂无图片</h3>
            <p class="text-gray-300 mb-6 text-sm">请点击上方"上传文件夹"按钮选择包含数据集的文件夹</p>
            <label for="file-upload" class="flex items-center justify-center bg-primary hover:bg-primary/90 text-white font-medium py-2.5 px-6 rounded-lg cursor-pointer transition-all text-sm">
                <i class="fa fa-upload mr-2"></i> 上传文件夹
            </label>
        </div>
        {% endif %}
    </main>

    <!-- 自动打标方式选择弹窗 -->
    <div id="auto-tag-modal" class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-xl w-96 p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-2">选择打标方式</h3>
            <p class="text-sm text-gray-400 mb-4">将对所有无标签的图片进行自动打标</p>
            <div class="space-y-3">
                <button class="w-full flex items-center gap-3 p-4 rounded-lg border-2 border-gray-200 hover:border-primary hover:bg-primary/5 transition-all text-left group" onclick="executeAutoTag('api')">
                    <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
                        <i class="fa fa-cloud text-primary"></i>
                    </div>
                    <div>
                        <div class="font-medium text-gray-800 group-hover:text-primary">API 视觉模型打标</div>
                        <div class="text-xs text-gray-400">通过 OpenAI 兼容 API 调用视觉模型</div>
                    </div>
                </button>
                <button class="w-full flex items-center gap-3 p-4 rounded-lg border-2 border-gray-200 hover:border-secondary hover:bg-secondary/5 transition-all text-left group" onclick="executeAutoTag('wd14')">
                    <div class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center flex-shrink-0">
                        <i class="fa fa-desktop text-secondary"></i>
                    </div>
                    <div>
                        <div class="font-medium text-gray-800 group-hover:text-secondary">WD14 本地打标</div>
                        <div class="text-xs text-gray-400">使用本地 ONNX 模型，无需 API</div>
                    </div>
                </button>
            </div>
            <div class="flex justify-end mt-5">
                <button class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg transition-colors" onclick="closeAutoTagModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 查找替换弹窗 -->
    <div id="find-replace-modal" class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-xl w-96 p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">查找替换标签</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">查找</label>
                    <input id="fr-find" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary transition-colors" placeholder="输入要查找的标签">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">替换为</label>
                    <input id="fr-replace" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary transition-colors" placeholder="输入替换后的标签（留空则删除）">
                </div>
            </div>
            <div id="fr-result" class="mt-3 text-sm text-gray-500 hidden"></div>
            <div class="flex justify-end gap-2 mt-5">
                <button class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg transition-colors" onclick="closeFindReplace()">取消</button>
                <button id="fr-preview-btn" class="px-4 py-2 text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition-colors" onclick="previewFindReplace()">预览</button>
                <button id="fr-execute-btn" class="px-4 py-2 text-sm bg-primary hover:bg-primary/90 text-white rounded-lg transition-colors" onclick="executeFindReplace()">全部替换</button>
            </div>
        </div>
    </div>

    <!-- 标签统计弹窗（含查找替换） -->
    <div id="tag-stats-modal" class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center hidden" onclick="if(event.target===this)closeTagStats()">
        <div class="bg-white rounded-xl shadow-xl w-[600px] max-h-[85vh] flex flex-col">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h3 class="text-lg font-semibold text-gray-800">标签统计</h3>
                <button class="text-gray-400 hover:text-gray-600 transition-colors" onclick="closeTagStats()"><i class="fa fa-times"></i></button>
            </div>
            <!-- 查找替换区 -->
            <div class="px-6 py-3 border-b border-gray-100 space-y-2">
                <div class="flex items-center gap-2">
                    <label class="text-xs text-gray-500 w-8 flex-shrink-0">查找</label>
                    <input id="ts-filter" type="text" class="flex-1 border border-blue-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-primary transition-colors" placeholder="输入字符筛选标签" oninput="filterTagStats()">
                </div>
                <div class="flex items-center gap-2">
                    <label class="text-xs text-gray-500 w-8 flex-shrink-0">替换</label>
                    <input id="ts-replace-find" type="text" class="flex-1 border border-amber-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-amber-400 transition-colors" placeholder="匹配标签中的字符串" oninput="updateReplaceBtnState()">
                    <i class="fa fa-arrow-right text-gray-300"></i>
                    <input id="ts-replace-to" type="text" class="flex-1 border border-amber-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-amber-400 transition-colors" placeholder="替换为">
                </div>
                <div class="flex items-center justify-between">
                    <span id="tag-stats-info" class="text-sm text-gray-400"></span>
                    <button id="ts-replace-btn" class="px-3 py-1 text-sm bg-primary hover:bg-primary/90 text-white rounded-lg transition-colors disabled:opacity-40" onclick="executeTagStatsReplace()" disabled>替换匹配项</button>
                </div>
            </div>
            <!-- 表格 -->
            <div class="flex-grow overflow-y-auto min-h-0" id="tag-stats-body">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 sticky top-0">
                        <tr>
                            <th class="text-left px-6 py-2 font-medium text-gray-500 w-8">#</th>
                            <th class="text-left px-4 py-2 font-medium text-gray-500">标签</th>
                            <th class="text-right px-4 py-2 font-medium text-gray-500 w-12 cursor-pointer select-none hover:text-primary" onclick="toggleTagStatsSort()">数量 <i id="ts-sort-icon" class="fa fa-sort-desc text-xs"></i></th>
                            <th class="text-left px-4 py-2 font-medium text-gray-500">翻译</th>
                        </tr>
                    </thead>
                    <tbody id="tag-stats-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 添加触发词弹窗 -->
    <div id="prepend-modal" class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-xl w-96 p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">添加触发词</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">触发词</label>
                    <input id="prepend-input" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary transition-colors" placeholder="多个用英文逗号分隔">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">插入位置</label>
                    <div class="flex gap-3">
                        <label class="flex items-center gap-1.5 text-sm cursor-pointer">
                            <input type="radio" name="prepend-pos" value="start" checked class="accent-primary"> 开头
                        </label>
                        <label class="flex items-center gap-1.5 text-sm cursor-pointer">
                            <input type="radio" name="prepend-pos" value="end"> 末尾
                        </label>
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-5">
                <button class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg transition-colors" onclick="closePrepend()">取消</button>
                <button id="prepend-execute-btn" class="px-4 py-2 text-sm bg-primary hover:bg-primary/90 text-white rounded-lg transition-colors" onclick="executePrepend()">确定</button>
            </div>
        </div>
    </div>

    <!-- 进度弹窗 -->
    <div id="progress-modal" class="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-2xl w-[480px] p-6">
            <h3 id="progress-title" class="text-lg font-semibold text-gray-800 mb-1">处理中</h3>
            <p id="progress-subtitle" class="text-sm text-gray-400 mb-4"></p>
            <div class="w-full bg-gray-200 rounded-full h-3 mb-3 overflow-hidden">
                <div id="progress-bar" class="bg-primary h-3 rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-sm text-gray-500 mb-3">
                <span id="progress-count">0 / 0</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="text-sm text-gray-600 mb-2 truncate" id="progress-item"></div>
            <div id="progress-errors" class="hidden max-h-32 overflow-y-auto text-sm text-red-600 bg-red-50 rounded-lg p-3 mb-4 space-y-1"></div>
            <div class="flex justify-end">
                <button id="progress-close-btn" class="hidden px-4 py-2 text-sm bg-primary hover:bg-primary/90 text-white rounded-lg transition-colors" onclick="closeProgressModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- 通知提示框 -->
    <div id="notification" class="fixed bottom-5 right-5 px-5 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 flex items-center z-50 text-sm"></div>

    <script>
        const allImages = {{ images | tojson }};
        let currentIndex = 0;
        let currentTags = [];
        let savedTags = '';  // 记录上次保存/加载时的标签文本

        // === 文件夹上传 ===
        function handleFolderSelect(input) {
            const allFiles = Array.from(input.files);
            if (allFiles.length === 0) return;
            const imageExts = ['png', 'jpg', 'jpeg', 'gif'];
            const imageBases = new Set();
            allFiles.forEach(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                if (imageExts.includes(ext)) imageBases.add(f.name.replace(/\.[^.]+$/, ''));
            });
            const toUpload = allFiles.filter(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                if (imageExts.includes(ext)) return true;
                if (ext === 'txt') return imageBases.has(f.name.replace(/\.[^.]+$/, ''));
                return false;
            });
            if (toUpload.length === 0) { showNotification('未找到图片文件', 'warning'); return; }
            const dt = new DataTransfer();
            toUpload.forEach(f => dt.items.add(f));
            input.files = dt.files;
            document.getElementById('upload-form').submit();
        }

        // === 删除图片 ===
        function deleteImage(name, index) {
            if (!confirm('确定要删除 ' + name + ' 吗？')) return;
            fetch('/delete/' + encodeURIComponent(name), {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    if (!data.success) { showNotification('删除失败', 'error'); return; }
                    allImages.splice(index, 1);
                    rebuildFileList();
                    document.getElementById('image-counter').textContent = allImages.length + ' 张';
                    if (allImages.length === 0) {
                        location.reload();
                    } else if (index < allImages.length) {
                        navigateTo(index);
                    } else {
                        navigateTo(allImages.length - 1);
                    }
                    showNotification('已删除 ' + name, 'success');
                })
                .catch(() => showNotification('删除失败', 'error'));
        }

        function rebuildFileList() {
            const list = document.getElementById('file-list');
            list.innerHTML = allImages.map((img, i) =>
                '<div class="file-item flex items-center px-2 py-1.5 text-sm cursor-pointer border-l-2 border-transparent hover:bg-primary/5 transition-colors group"'
                + ' data-image="' + escapeHtml(img) + '" data-index="' + i + '">'
                + '<button class="del-btn flex-shrink-0 w-5 h-5 flex items-center justify-center text-gray-300 hover:text-red-500 transition-colors rounded opacity-0 group-hover:opacity-100" data-name="' + escapeHtml(img) + '" data-index="' + i + '" title="删除">'
                + '<i class="fa fa-times text-xs"></i></button>'
                + '<span class="flex-1 min-w-0 truncate ml-1 text-gray-600 group-hover:text-gray-800" title="' + escapeHtml(img) + '">' + escapeHtml(img) + '</span></div>'
            ).join('');
        }

        // 文件列表事件委托：点击删除按钮 vs 点击文件项
        document.getElementById('file-list')?.addEventListener('click', function(e) {
            const delBtn = e.target.closest('.del-btn');
            if (delBtn) {
                deleteImage(delBtn.dataset.name, parseInt(delBtn.dataset.index));
                return;
            }
            const item = e.target.closest('.file-item');
            if (item) {
                navigateTo(parseInt(item.dataset.index));
            }
        });

        // === 导航 ===
        function isDirty() {
            const current = currentTags.map(t => t.tag).filter(t => t.trim()).join(', ');
            return current !== savedTags && (current || savedTags);
        }

        function navigateTo(index) {
            if (index < 0 || index >= allImages.length) return;
            if (isDirty()) {
                if (confirm('当前标签未保存，是否保存？')) {
                    saveCaption().then(() => doNavigate(index));
                    return;
                }
                // 用户选择不保存，立即重置脏状态
                savedTags = currentTags.map(t => t.tag).filter(t => t.trim()).join(', ');
                currentTags = currentTags.map(t => ({tag: t.tag, translation: t.translation}));
            }
            doNavigate(index);
        }

        function doNavigate(index) {
            currentIndex = index;
            // 立即重置脏状态，防止快速切换时误判
            currentTags = [];
            savedTags = '';
            focusedRowIndex = -1;
            const name = allImages[index];

            document.getElementById('preview-img').src = '/uploads/' + encodeURIComponent(name);
            fitPreviewImage();

            document.querySelectorAll('.file-item').forEach((el, i) => {
                const active = (i === index);
                el.classList.toggle('bg-primary/5', active);
                el.classList.toggle('border-l-primary', active);
                el.classList.toggle('border-l-2', true);
                el.querySelector('span').classList.toggle('text-primary', active);
                el.querySelector('span').classList.toggle('font-medium', active);
                el.querySelector('span').classList.toggle('text-gray-600', !active);
            });
            const activeItem = document.querySelector('.file-item[data-index="' + index + '"]');
            if (activeItem) activeItem.scrollIntoView({ block: 'nearest' });

            document.getElementById('btn-prev').disabled = (index === 0);
            document.getElementById('btn-next').disabled = (index === allImages.length - 1);

            // 预加载前后图片和标签
            if (index > 0) {
                new Image().src = '/uploads/' + encodeURIComponent(allImages[index - 1]);
                fetch('/get_caption/' + encodeURIComponent(allImages[index - 1]));
            }
            if (index < allImages.length - 1) {
                new Image().src = '/uploads/' + encodeURIComponent(allImages[index + 1]);
                fetch('/get_caption/' + encodeURIComponent(allImages[index + 1]));
            }

            loadCaption(name);
        }
        function navigatePrev() { navigateTo(currentIndex - 1); }

        // 预览图自适应缩放：小图放大填充预览区
        function fitPreviewImage() {
            const img = document.getElementById('preview-img');
            const area = document.getElementById('preview-area');
            if (!img || !area || !img.naturalWidth) return;
            const maxW = area.clientWidth - 16; // p-2 = 8px * 2
            const maxH = area.clientHeight - 16;
            if (maxW <= 0 || maxH <= 0) return;
            const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight);
            img.style.width = Math.round(img.naturalWidth * scale) + 'px';
            img.style.height = Math.round(img.naturalHeight * scale) + 'px';
        }

        document.getElementById('preview-img').addEventListener('load', fitPreviewImage);
        function navigateNext() { navigateTo(currentIndex + 1); }
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'ArrowLeft') navigatePrev();
            if (e.key === 'ArrowRight') navigateNext();
        });

        // === 标签列表渲染 ===
        let dragSrcIndex = null;
        let focusedRowIndex = -1; // 当前聚焦的标签行

        function renderTags() {
            const container = document.getElementById('tags-container');
            if (currentTags.length === 0) {
                container.innerHTML = '<div class="p-8 text-center text-gray-300 text-sm">暂无标签，点击"添加行"新增</div>';
                return;
            }
            let html = '';
            currentTags.forEach((item, i) => {
                html += '<div class="flex items-center border-b border-gray-100 hover:bg-gray-50/80 transition-colors group cursor-grab active:cursor-grabbing" draggable="true" data-row="' + i + '">'
                    + '<button class="w-7 flex-shrink-0 text-gray-300 hover:text-red-500 transition-colors text-center opacity-0 group-hover:opacity-100" onclick="removeTag(' + i + ')" title="删除"><i class="fa fa-times text-xs"></i></button>'
                    + '<input class="flex-1 min-w-0 px-2 py-1.5 text-sm border-0 bg-transparent focus:outline-none focus:bg-blue-50/80 rounded-sm transition-colors" '
                    + 'value="' + escapeHtml(item.tag) + '" oninput="currentTags[' + i + '].tag=this.value" onchange="onTagChanged(' + i + ')" onfocus="focusedRowIndex=' + i + '">'
                    + '<div class="w-px self-stretch bg-gray-200"></div>'
                    + '<input class="flex-1 min-w-0 px-2 py-1.5 text-sm border-0 bg-transparent focus:outline-none focus:bg-green-50/80 rounded-sm transition-colors text-gray-500" '
                    + 'value="' + escapeHtml(item.translation) + '" oninput="currentTags[' + i + '].translation=this.value" placeholder="..." onfocus="focusedRowIndex=' + i + '">'
                    + '<button class="w-7 flex-shrink-0 text-gray-300 hover:text-red-500 transition-colors text-center opacity-0 group-hover:opacity-100" onclick="removeTag(' + i + ')" title="删除"><i class="fa fa-times text-xs"></i></button>'
                    + '</div>';
            });
            container.innerHTML = html;

            // 绑定拖拽事件
            container.querySelectorAll('[data-row]').forEach(row => {
                row.addEventListener('dragstart', function(e) {
                    dragSrcIndex = parseInt(this.dataset.row);
                    e.dataTransfer.effectAllowed = 'move';
                    this.style.opacity = '0.4';
                });
                row.addEventListener('dragend', function() {
                    this.style.opacity = '';
                    container.querySelectorAll('[data-row]').forEach(r => r.classList.remove('border-t-2', 'border-t-primary'));
                });
                row.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    container.querySelectorAll('[data-row]').forEach(r => r.classList.remove('border-t-2', 'border-t-primary'));
                    this.classList.add('border-t-2', 'border-t-primary');
                });
                row.addEventListener('drop', function(e) {
                    e.preventDefault();
                    const dropIndex = parseInt(this.dataset.row);
                    if (dragSrcIndex === null || dragSrcIndex === dropIndex) return;
                    const moved = currentTags.splice(dragSrcIndex, 1)[0];
                    currentTags.splice(dropIndex, 0, moved);
                    renderTags();
                });
            });
        }

        function addTag() {
            const insertAt = (focusedRowIndex >= 0 && focusedRowIndex < currentTags.length)
                ? focusedRowIndex + 1 : currentTags.length;
            currentTags.splice(insertAt, 0, {tag: '', translation: ''});
            renderTags();
            // 聚焦新插入行的标签输入框
            const newRow = document.querySelector('[data-row="' + insertAt + '"]');
            if (newRow) newRow.querySelectorAll('input')[0].focus();
        }

        function removeTag(index) {
            currentTags.splice(index, 1);
            renderTags();
        }

        // 标签被修改后，自动从缓存查找新标签的翻译
        function onTagChanged(index) {
            const tag = currentTags[index].tag.trim().toLowerCase();
            if (!tag) { currentTags[index].translation = ''; return; }
            fetch('/lookup_cache', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({tags: [tag]})
            })
            .then(r => r.json())
            .then(data => {
                const tr = (data.translations && data.translations[0]) || '';
                currentTags[index].translation = tr;
                // 更新对应的翻译输入框
                const row = document.querySelectorAll('[data-row="' + index + '"]')[0];
                if (row) row.querySelectorAll('input')[1].value = tr;
            });
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // === 加载标签（一次请求获取标签+翻译） ===
        let loadSeq = 0;
        function loadCaption(imageName) {
            const seq = ++loadSeq;
            currentTags = [];
            renderTags();
            fetch('/get_caption/' + encodeURIComponent(imageName))
                .then(r => r.json())
                .then(data => {
                    if (seq !== loadSeq) return; // 过期响应，丢弃
                    const text = (data.caption || '').trim();
                    if (text) {
                        currentTags = text.split(',').map(t => ({tag: t.trim(), translation: ''}));
                        savedTags = text;
                        const translations = data.translations || [];
                        let ti = 0;
                        currentTags.forEach((t, i) => {
                            if (t.tag && ti < translations.length) {
                                if (translations[ti]) t.translation = translations[ti];
                                ti++;
                            }
                        });
                        renderTags();
                    } else {
                        savedTags = '';
                        renderTags();
                    }
                })
                .catch(() => { if (seq === loadSeq) showNotification('加载标签文件失败', 'error'); });
        }

        // === 批量翻译标签 ===
        function translateAllTags(direction) {
            if (currentTags.length === 0) { showNotification('没有可翻译的标签', 'warning'); return; }

            const isEn2Zh = (direction === 'en2zh');
            const btnId = isEn2Zh ? 'btn-translate-en' : 'btn-translate-zh';
            const btn = document.getElementById(btnId);
            const srcField = isEn2Zh ? 'tag' : 'translation';
            const dstField = isEn2Zh ? 'translation' : 'tag';
            const srcLang = isEn2Zh ? 'en' : 'zh';
            const dstLang = isEn2Zh ? 'zh' : 'en';
            const origHtml = btn.innerHTML;

            const toTranslate = [];
            const indices = [];
            currentTags.forEach((t, i) => {
                if (t[srcField].trim() && !t[dstField].trim()) {
                    toTranslate.push(t[srcField].trim());
                    indices.push(i);
                }
            });
            if (toTranslate.length === 0) {
                showNotification('没有需要翻译的内容', 'warning');
                return;
            }

            btn.disabled = true; btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-1"></i> ...';

            fetch('/translate_tags', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({tags: toTranslate, src: srcLang, dst: dstLang})
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) { showNotification('翻译失败: ' + data.error, 'error'); return; }
                const translations = data.translations || [];
                translations.forEach((tr, ti) => {
                    if (ti < indices.length) currentTags[indices[ti]][dstField] = isEn2Zh ? tr : tr.toLowerCase();
                });
                renderTags();
                showNotification('翻译完成', 'success');
            })
            .catch(() => showNotification('翻译失败', 'error'))
            .finally(() => { btn.disabled = false; btn.innerHTML = origHtml; });
        }

        // === 保存 ===
        function saveCaption() {
            const btn = document.getElementById('btn-save');
            btn.disabled = true; btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-1"></i> 保存中...';
            const tags = currentTags.map(t => t.tag.trim()).filter(t => t);
            const seen = new Set();
            const content = tags.filter(t => { const k = t.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true; }).join(', ');

            // 先查找缓存，将用户手动编辑的翻译与缓存合并后更新缓存
            const tagKeys = currentTags.map(t => t.tag.trim().toLowerCase()).filter(t => t);
            const userTranslations = {};
            currentTags.forEach(t => {
                const tag = t.tag.trim().toLowerCase();
                const tr = t.translation.trim();
                if (tag && tr) userTranslations[tag] = tr;
            });

            return fetch('/lookup_cache', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({tags: tagKeys})
            })
            .then(r => r.json())
            .then(cacheData => {
                // 构建 translations：用户翻译优先，无用户翻译则用缓存
                const translations = {};
                const cached = cacheData.translations || [];
                currentTags.forEach((t, i) => {
                    const tag = t.tag.trim().toLowerCase();
                    const tr = t.translation.trim();
                    if (tag && tr) {
                        translations[tag] = tr;
                    } else if (tag && i < cached.length && cached[i]) {
                        translations[tag] = cached[i];
                    }
                });
                return fetch('/save_caption/' + encodeURIComponent(allImages[currentIndex]), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content: content, translations: translations})
                });
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) savedTags = content;
                showNotification(data.success ? '保存成功' : '保存失败', data.success ? 'success' : 'error');
            })
            .catch(() => showNotification('保存失败', 'error'))
            .finally(() => { btn.disabled = false; btn.innerHTML = '<i class="fa fa-save mr-1"></i> 保存当前标签'; });
        }

        // === 自动打标弹窗 ===
        function openAutoTagModal() {
            document.getElementById('auto-tag-modal').classList.remove('hidden');
        }
        function closeAutoTagModal() {
            document.getElementById('auto-tag-modal').classList.add('hidden');
        }
        document.getElementById('auto-tag-modal').addEventListener('click', function(e) {
            if (e.target === this) closeAutoTagModal();
        });

        function executeAutoTag(method) {
            closeAutoTagModal();
            const btn = document.getElementById('btn-auto-tag');
            btn.disabled = true; btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> <span>打标中...</span>';
            const url = (method === 'wd14') ? '/auto_tag_wd14' : '/auto_tag';
            const label = (method === 'wd14') ? 'WD14 本地打标' : 'API 视觉模型打标';
            executeWithProgress(url, {}, label, '正在为无标签图片自动生成标签...',

                },

        // === 添加触发词 ===
        function prependTags() {
            document.getElementById('prepend-modal').classList.remove('hidden');
            document.getElementById('prepend-input').focus();
        }
        function closePrepend() {
            document.getElementById('prepend-modal').classList.add('hidden');
        }
        function executePrepend() {
            const input = document.getElementById('prepend-input').value.trim();
            if (!input) { showNotification('请输入触发词', 'warning'); return; }
            const pos = document.querySelector('input[name="prepend-pos"]:checked').value;

            fetch('/prepend_tags', {

            })

        document.getElementById('prepend-modal').addEventListener('click', function(e) {

        // === 批量翻译所有未翻译标签 ===
        function batchTranslate() {
            const btn = document.getElementById('btn-batch-translate');
            btn.disabled = true; btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> <span>翻译中...</span>';
            executeWithProgress('/batch_translate', {src: 'en', dst: 'zh'}, '批量翻译标签', '正在翻译所有未缓存的标签...',
                function(data) {
                    btn.disabled = false; btn.innerHTML = '<i class="fa fa-language mr-2"></i> <span>批量翻译</span>';
                },
                function(data) {
                    return '翻译完成：' + data.translated + ' 个标签，涉及 ' + data.files + ' 个文件'
                        + (data.errors ? '，失败 ' + data.errors + ' 批' : '');
                }
            );
        }

        // === 防止刷新/关闭丢失未保存标签 ===
        window.addEventListener('beforeunload', function(e) {
            if (isDirty()) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // === SSE 进度流式消费 ===
        function executeWithProgress(url, body, title, subtitle, onComplete, summaryFn) {
            const modal = document.getElementById('progress-modal');
            const bar = document.getElementById('progress-bar');
            const count = document.getElementById('progress-count');
            const pct = document.getElementById('progress-percent');
            const itemEl = document.getElementById('progress-item');
            const errBox = document.getElementById('progress-errors');
            const closeBtn = document.getElementById('progress-close-btn');

            // 重置（不立即显示，等确认是 SSE 流后才打开）
            function openModal() {
                document.getElementById('progress-title').textContent = title;
                document.getElementById('progress-subtitle').textContent = subtitle;
                bar.style.width = '0%';
                bar.classList.remove('bg-red-500'); bar.classList.add('bg-primary');
                count.textContent = '0 / 0';
                pct.textContent = '0%';
                itemEl.textContent = '';
                errBox.innerHTML = ''; errBox.classList.add('hidden');
                closeBtn.classList.add('hidden');
                modal.classList.remove('hidden');
            }

            fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            }).then(function(response) {
                var contentType = response.headers.get('Content-Type') || '';
                // 非 SSE 响应（前置校验返回的 JSON）— 不弹窗，直接通知
                if (contentType.includes('application/json')) {
                    return response.json().then(function(data) {
                        if (data.error) {
                            showNotification(data.error, 'error');
                        } else if (data.message) {
                            showNotification(data.message, 'info');
                        }
                        if (onComplete) onComplete({tagged: 0, skipped: 0, errors: 0, translated: 0, files: 0, _noReload: true});
                        return null;
                    });
                }
                if (!response.ok) {
                    return response.text().then(function(text) {
                        var msg = '请求失败';
                        try { msg = JSON.parse(text).error || msg; } catch(e) {}
                        throw new Error(msg);
                    });
                }

                // SSE 流式消费 — 确认是流式响应，打开弹窗
                openModal();
                var reader = response.body.getReader();
                var decoder = new TextDecoder();
                var buffer = '';
                var currentEventType = '';

                function processLines() {
                    var lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i];
                        if (line.startsWith('event: ')) {
                            currentEventType = line.slice(7).trim();
                        } else if (line.startsWith('data: ')) {
                            try {
                                var data = JSON.parse(line.slice(6));
                            } catch(e) { currentEventType = ''; continue; }
                            if (currentEventType === 'progress') {
                                var percent = Math.round((data.current / data.total) * 100);
                                bar.style.width = percent + '%';
                                count.textContent = data.current + ' / ' + data.total;
                                pct.textContent = percent + '%';
                                itemEl.textContent = data.item || '';
                            } else if (currentEventType === 'error') {
                                errBox.classList.remove('hidden');
                                var div = document.createElement('div');
                                div.textContent = (data.item ? data.item + ': ' : '') + data.error;
                                errBox.appendChild(div);
                                errBox.scrollTop = errBox.scrollHeight;
                                // 出错即中断，显示关闭按钮
                                reader.cancel();
                                bar.classList.remove('bg-primary'); bar.classList.add('bg-red-500');
                                closeBtn.classList.remove('hidden');
                                if (onComplete) onComplete({tagged: 0, skipped: 0, errors: 1, translated: 0, files: 0, _error: true});
                                return;
                            } else if (currentEventType === 'complete') {
                                bar.style.width = '100%';
                                pct.textContent = '100%';
                                itemEl.textContent = '';
                                if (summaryFn) {
                                    document.getElementById('progress-subtitle').textContent = summaryFn(data);
                                }
                                closeBtn.classList.remove('hidden');
                                if (onComplete) onComplete(data);
                            } else if (currentEventType === 'fatal') {
                                bar.style.width = '100%';
                                bar.classList.remove('bg-primary'); bar.classList.add('bg-red-500');
                                itemEl.textContent = data.error;
                                closeBtn.classList.remove('hidden');
                                if (onComplete) onComplete({tagged: 0, skipped: 0, errors: 1, translated: 0, files: 0, _error: true});
                            }
                            currentEventType = '';
                        }
                    }
                }

                function read() {
                    reader.read().then(function(result) {
                        if (result.done) {
                            // 流结束，flush 残留数据
                            if (buffer.trim()) {
                                buffer += '\n';
                                processLines();
                            }
                            return;
                        }
                        buffer += decoder.decode(result.value, {stream: true});
                        processLines();
                        read();
                    });
                }
                read();
                return null;
            }).catch(function(err) {
                showNotification(err.message || '请求失败', 'error');
                if (onComplete) onComplete({tagged: 0, skipped: 0, errors: 0, translated: 0, files: 0, _error: true});
            });
        }

        function closeProgressModal() {
            document.getElementById('progress-modal').classList.add('hidden');
            // 进度弹窗关闭时刷新页面以加载最新数据
            location.reload();
        }

        // === 通知 ===
        let _notifyTimer = null;
        function showNotification(message, type) {
            const n = document.getElementById('notification');
            const colors = {success:'bg-green-500 text-white',error:'bg-red-500 text-white',warning:'bg-amber-500 text-white',info:'bg-blue-500 text-white'};
            n.className = 'fixed bottom-5 right-5 px-5 py-3 rounded-lg shadow-lg flex items-center z-50 transition-all duration-300 text-sm ' + (colors[type]||colors.info);
            n.textContent = message;
            n.style.transform = 'translateY(0)'; n.style.opacity = '1';
            if (_notifyTimer) clearTimeout(_notifyTimer);
            _notifyTimer = setTimeout(() => { n.style.transform = 'translateY(20px)'; n.style.opacity = '0'; _notifyTimer = null; }, 3000);
        }

        // === 切换预览 ===
        let previewVisible = true;
        function togglePreview() {
            previewVisible = !previewVisible;
            const panel = document.getElementById('preview-panel');
            const btn = document.getElementById('btn-toggle-preview');
            panel.style.display = previewVisible ? '' : 'none';
            btn.innerHTML = previewVisible
                ? '<i class="fa fa-eye mr-2"></i> <span>隐藏预览</span>'
                : '<i class="fa fa-eye-slash mr-2"></i> <span>显示预览</span>';
        }

        // === 切换编辑区 ===
        let editorVisible = true;
        function toggleEditor() {
            editorVisible = !editorVisible;
            const editor = document.getElementById('editor-panel');
            const preview = document.getElementById('preview-panel');
            const btn = document.getElementById('btn-toggle-editor');
            if (editorVisible) {
                editor.style.display = '';
                preview.classList.remove('flex-grow');
                preview.classList.add('w-64');
            } else {
                editor.style.display = 'none';
                preview.classList.remove('w-64');
                preview.classList.add('flex-grow');
            }
            btn.innerHTML = editorVisible
                ? '<i class="fa fa-columns mr-2"></i> <span>隐藏编辑</span>'
                : '<i class="fa fa-columns mr-2"></i> <span>显示编辑</span>';
        }

        // === 标签统计 + 查找替换 ===
        let allTagStats = [];
        let tagStatsSortDesc = true; // 默认降序

        function toggleTagStatsSort() {
            tagStatsSortDesc = !tagStatsSortDesc;
            document.getElementById('ts-sort-icon').className =
                tagStatsSortDesc ? 'fa fa-sort-desc text-xs' : 'fa fa-sort-asc text-xs';
            filterTagStats();
        }

        function sortTagStats(stats) {
            return stats.slice().sort((a, b) => tagStatsSortDesc ? b.count - a.count : a.count - b.count);
        }

        function navigateToEditor() {
            if (currentIndex >= 0 && allImages[currentIndex]) {
                window.location.href = '/editor#' + encodeURIComponent(allImages[currentIndex]);
                return false;
            }
            return true;
        }

        function openTagStats() {
            document.getElementById('tag-stats-modal').classList.remove('hidden');
            document.getElementById('ts-filter').value = '';
            document.getElementById('ts-replace-find').value = '';
            document.getElementById('ts-replace-to').value = '';
            document.getElementById('ts-replace-btn').disabled = true;  // 替换框初始为空
            document.getElementById('ts-sort-icon').className = 'fa fa-sort-desc text-xs';
            tagStatsSortDesc = true;
            document.getElementById('tag-stats-info').textContent = '加载中...';
            document.getElementById('tag-stats-tbody').innerHTML = '';
            fetch('/tag_stats')
            .then(r => r.json())
            .then(data => {
                allTagStats = data.stats || [];
                document.getElementById('tag-stats-info').textContent =
                    '共 ' + data.total_files + ' 个文件，' + allTagStats.length + ' 种标签';
                renderTagStatsTable(sortTagStats(allTagStats));
            })
            .catch(() => {
                document.getElementById('tag-stats-info').textContent = '加载失败';
            });
        }

        function closeTagStats() {
            document.getElementById('tag-stats-modal').classList.add('hidden');
        }

        function renderTagStatsTable(stats) {
            if (!stats.length) {
                document.getElementById('tag-stats-tbody').innerHTML =
                    '<tr><td colspan="4" class="text-center text-gray-300 py-8">暂无匹配标签</td></tr>';
                return;
            }
            document.getElementById('tag-stats-tbody').innerHTML = stats.map((s, i) =>
                '<tr class="border-b border-gray-50 hover:bg-gray-50/80">'
                + '<td class="px-6 py-1.5 text-gray-300">' + (i + 1) + '</td>'
                + '<td class="px-4 py-1.5 font-mono">' + escapeHtml(s.tag) + '</td>'
                + '<td class="px-4 py-1.5 text-right font-medium text-primary">' + s.count + '</td>'
                + '<td class="px-4 py-1.5 text-gray-400">' + escapeHtml(s.translation || '') + '</td>'
                + '</tr>'
            ).join('');
        }

        function filterTagStats() {
            const keyword = document.getElementById('ts-filter').value.trim().toLowerCase();
            const base = '共 ' + (allTagStats.length || 0) + ' 种标签';
            if (!keyword) {
                renderTagStatsTable(sortTagStats(allTagStats));
                document.getElementById('tag-stats-info').textContent = base;
                return;
            }
            const filtered = sortTagStats(allTagStats.filter(s => s.tag.includes(keyword)));
            document.getElementById('tag-stats-info').textContent =
                base + '，匹配 ' + filtered.length + ' 种（共 ' + filtered.reduce((a, s) => a + s.count, 0) + ' 处）';
            renderTagStatsTable(filtered);
        }

        function updateReplaceBtnState() {
            document.getElementById('ts-replace-btn').disabled =
                !document.getElementById('ts-replace-find').value.trim();
        }

        function executeTagStatsReplace() {
            const replaceFind = document.getElementById('ts-replace-find').value.trim();
            const replaceTo = document.getElementById('ts-replace-to').value.trim();
            if (!replaceFind) { showNotification('请输入替换查找内容', 'warning'); return; }

            const findLower = replaceFind.toLowerCase();
            const matchedTags = allTagStats.filter(s => s.tag === findLower).map(s => s.tag);
            if (!matchedTags.length) { showNotification('没有匹配的标签', 'info'); return; }

            const btn = document.getElementById('ts-replace-btn');
            btn.disabled = true; btn.textContent = '替换中...';

            const saveP = isDirty() ? saveCaption() : Promise.resolve();
            saveP.then(() => {
                let chain = Promise.resolve({replaced: 0, updated_files: 0});
                for (const tag of matchedTags) {
                    chain = chain.then(acc => {
                        return fetch('/find_replace', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({find: tag, replace: replaceTo})
                        })
                        .then(r => r.json())
                        .then(data => ({
                            replaced: acc.replaced + (data.replaced || 0),
                            updated_files: acc.updated_files + (data.updated_files || 0)
                        }));
                    });
                }
                return chain;
            })
            .then(acc => {
                showNotification('替换完成：' + acc.replaced + ' 处，涉及 ' + acc.updated_files + ' 个文件', 'success');
                savedTags = currentTags.map(t => t.tag).filter(t => t.trim()).join(', ');
                setTimeout(() => {
                    window.location.hash = encodeURIComponent(allImages[currentIndex]);
                    location.reload();
                }, 1000);
            })
            .catch(() => showNotification('替换失败', 'error'))
            .finally(() => { btn.disabled = false; btn.textContent = '替换匹配项'; });
        }

        // 旧函数兼容
        function openFindReplace() { openTagStats(); }

        document.getElementById('clear-all').addEventListener('click', function() {
            if (confirm('确定要清空所有图片和标签文件吗？此操作不可恢复。')) {
                savedTags = currentTags.map(t => t.tag).filter(t => t.trim()).join(', ');
                fetch('/clear_all', {method: 'POST'}).then(() => location.reload());
            }
        });

        // 初始化
        if (allImages.length > 0) {
            rebuildFileList();
            // 读取 hash 恢复之前查看的图片
            const hashName = decodeURIComponent(window.location.hash.slice(1));
            const hashIndex = hashName ? allImages.indexOf(hashName) : -1;
            navigateTo(hashIndex >= 0 ? hashIndex : 0);
        }
    </script>
</body>
</html>
