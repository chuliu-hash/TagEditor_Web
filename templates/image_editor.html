            if (!originalImage || !editorDirty) return;

            // 在异步操作（toBlob → fetch）开始前捕获当前文件名与索引。
            // 旋转的自动保存会在 onload 内静默触发，若保存进行中用户已导航到其他图片，
            // 回调里的 currentIndex 会指向新图片 → 误存到错误的文件名。捕获快照保证存的是
            // 「发起保存时正在编辑的那张」，且回调里只在用户仍停留在该图时刷新其预览。
            const saveIndex = currentIndex;
            const saveFilename = allImages[saveIndex];

            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> 保存中...';

            // 导出为 PNG 并以 multipart 直传二进制（避免 base64 膨胀 + JSON 编码开销）
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = originalImage.naturalWidth;
            tempCanvas.height = originalImage.naturalHeight;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(originalImage, 0, 0);

            tempCanvas.toBlob(function(blob) {
                if (!blob) {
                    showNotification('图片导出失败', 'error');
                    btn.disabled = !editorDirty;  // blob 失败时恢复按钮（此 return 不经过下方 finally）
                    btn.innerHTML = '<i class="fa fa-save mr-2"></i> 保存';
                    return;
                }
                const fd = new FormData();
                fd.append('filename', saveFilename);
                fd.append('image', blob, saveFilename);
                fetch('/process_image', {
                    method: 'POST',
                    body: fd  // 不设 Content-Type，浏览器自动加 multipart boundary
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        // 仅当用户仍停留在发起保存的那张图时，才重置脏状态 + 刷新预览。
                        // 若已导航离开，该图的保存仍会落盘（正确），但不干扰当前查看的新图。
                        if (currentIndex === saveIndex) {
                            editorDirty = false;
                            if (!silent) showNotification('保存成功 (' + data.width + 'x' + data.height + ')', 'success');
                            // 如果文件名变了（如 jpg→png），更新列表
                            if (data.filename !== allImages[saveIndex]) {
                                allImages[saveIndex] = data.filename;
                                rebuildFileList();
                                updateNavUI();
                            }
                            // 刷新预览（文件已覆盖保存，强制刷新）
                            loadImageIntoEditor(allImages[saveIndex], true);
                        }
                    } else {
                        showNotification(data.error || '保存失败', 'error');
                    }
                })
                .catch(() => showNotification('保存失败', 'error'))
                .finally(() => {
                    btn.disabled = !editorDirty;
                    btn.innerHTML = '<i class="fa fa-save mr-2"></i> 保存';
                });
            }, 'image/png');
        }

        // === 重置 ===
        function resetEditor() {
            if (currentIndex < 0) return;
            editorDirty = false;
            cropRect = null;
            // 退出裁剪模式
            if (cropMode) {
                cropMode = false;
                const toolbar = document.getElementById('crop-toolbar');
                if (toolbar) toolbar.classList.add('hidden');
                updateCropButton();
            }
            loadImageIntoEditor(allImages[currentIndex]);
        }

        // === 按钮状态 ===
        function updateButtonStates() {
            // 裁剪框在有图时始终存在，按钮可用性只取决于是否选中图片
            document.getElementById('btn-crop').disabled = currentIndex < 0;
            document.getElementById('btn-reset').disabled = currentIndex < 0;
            document.getElementById('btn-save').disabled = !editorDirty;
            // 暂存态（editorDirty，裁剪/缩放/超清放大/背景移除后）禁止旋转和透明转色底：
            // 这两者会自动落盘覆盖原图，与暂存态冲突。需先保存或重置才能执行。
            const blockedByDirty = editorDirty;
            document.getElementById('btn-rotate').disabled = currentIndex < 0 || blockedByDirty;
            document.getElementById('btn-alpha').disabled = currentIndex < 0 || blockedByDirty;
            // 超清放大按钮：放大进行中强制禁用并显示 spinner，其余按是否选中图片决定。
            // 统一在这里管理，避免重置/切图等异步 onload 误改放大中按钮状态。
            const upscaleBtn = document.getElementById('btn-upscale');
            upscaleBtn.disabled = _upscaleBusy || currentIndex < 0;
            upscaleBtn.innerHTML = _upscaleBusy
                ? '<i class="fa fa-spinner fa-spin mr-2"></i> 放大中...'
                : '<i class="fa fa-diamond mr-2"></i> 超清放大';
            // 背景移除按钮：进行中显示 spinner；暂存态禁用（与旋转/转色底同组）
            const removeBgBtn = document.getElementById('btn-remove-bg');
            removeBgBtn.disabled = _removebgBusy || currentIndex < 0 || blockedByDirty;
            removeBgBtn.innerHTML = _removebgBusy
                ? '<i class="fa fa-spinner fa-spin mr-2"></i> 移除中...'
                : '<i class="fa fa-eraser mr-2"></i> 背景移除';
        }

        // === 通知 ===
        let _notifyTimer = null;
        function showNotification(message, type) {
            const n = document.getElementById('notification');
            const colors = {success:'bg-green-500 text-white',error:'bg-red-500 text-white',warning:'bg-amber-500 text-white',info:'bg-blue-500 text-white'};
            n.className = 'fixed bottom-5 right-5 px-5 py-3 rounded-lg shadow-lg flex items-center z-50 transition-all duration-300 text-sm ' + (colors[type]||colors.info);
            n.textContent = message;
            n.style.transform = 'translateY(0)'; n.style.opacity = '1';
            if (_notifyTimer) clearTimeout(_notifyTimer);
            _notifyTimer = setTimeout(() => { n.style.transform = 'translateY(20px)'; n.style.opacity = '0'; _notifyTimer = null; }, 3000);
        }

        // === 工具 ===
        function navigateToTags() {
            const target = (currentIndex >= 0 && allImages[currentIndex])
                ? '/#' + encodeURIComponent(allImages[currentIndex])
                : '/';
            navigateAway(target);
            return false;  // 阻止 a 标签默认跳转（由 navigateAway 处理）
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // 防止刷新丢失
        window.addEventListener('beforeunload', function(e) {
            if (editorDirty) { e.preventDefault(); e.returnValue = ''; }
        });

        // 底色记忆：恢复上次选择的颜色，变化时持久化
        (function() {
            const ci = document.getElementById('alpha-bg-color');
            if (!ci) return;
            const saved = localStorage.getItem('alpha_bg_color');
            if (saved) ci.value = saved;
            ci.addEventListener('change', function() { localStorage.setItem('alpha_bg_color', this.value); });
        })();

        // 裁剪目标分辨率记忆
        (function() {
            try {
                const t = JSON.parse(localStorage.getItem('crop_target'));
                if (Array.isArray(t) && t.length === 2 && t[0] > 0 && t[1] > 0) {
                    document.getElementById('crop-w').value = t[0];
                    document.getElementById('crop-h').value = t[1];
                }
            } catch (e) {}
        })();

        // 初始化
        if (allImages.length > 0) {
            rebuildFileList();
            const hashName = decodeURIComponent(window.location.hash.slice(1));
            const hashIndex = hashName ? allImages.indexOf(hashName) : -1;
            navigateTo(hashIndex >= 0 ? hashIndex : 0);
            // 延迟启动 ResizeObserver，确保 DOM 稳定
            setTimeout(() => {
                const editorArea = document.getElementById('editor-area');
                if (editorArea) resizeObserver.observe(editorArea);
            }, 100);
        }
    </script>
</body>
